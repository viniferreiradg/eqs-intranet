<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações — Temas — Althus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Design system -->
  <link rel="stylesheet" href="../storybook-desktop/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../shared/page.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Sidebar/Sidebar.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Avatar/Avatar.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Background/Background.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Tab/Tab.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Divider/Divider.module.css" />
  <link rel="stylesheet" href="../storybook-desktop/src/components/Card/Card.module.css" />
</head>
<body data-page="configuracoes">

<aside id="sidebar-root"></aside>

<main class="main bgWrapper" id="main">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <!-- Page header -->
  <div class="pageHeader">
    <div>
      <h1 class="pageTitle">Configurações</h1>
      <p class="pageSubtitle">Gerencie sua conta e as preferências da rede</p>
    </div>
  </div>

  <!-- Tab nav -->
  <div class="tabNav">
    <div class="tabList" role="tablist">
      <button class="tabBtn tabLeft"            role="tab" aria-selected="false" onclick="location.href='jornada-2-10-1-minha-conta.html'">Minha conta</button>
      <button class="tabBtn tabMiddle"          role="tab" aria-selected="false" onclick="location.href='jornada-2-10-2-perfil-empresa.html'">Perfil da empresa</button>
      <button class="tabBtn tabMiddle tabBtnActive" role="tab" aria-selected="true">Temas</button>
      <button class="tabBtn tabMiddle"          role="tab" aria-selected="false" onclick="location.href='jornada-2-10-3-notificacoes.html'">Notificações</button>
      <button class="tabBtn tabMiddle"          role="tab" aria-selected="false" onclick="location.href='jornada-2-10-4-termos.html'">Termos de uso</button>
      <button class="tabBtn tabMiddle"          role="tab" aria-selected="false" onclick="location.href='jornada-2-10-5-sobre.html'">Sobre a Althus</button>
      <button class="tabBtn tabRight"           role="tab" aria-selected="false" onclick="location.href='jornada-2-10-6-ajuda.html'">Ajuda / Suporte</button>
    </div>
  </div>

  <!-- Content -->
  <div class="pageContent">
    <div class="card">

      <!-- ── Sistema de cores ─────────────────────────────────────────── -->
      <div class="formSection">
        <h2 class="sectionTitle">Sistema de cores</h2>
        <p class="sectionSubtitle">Escolha entre o modo escuro e o modo claro da interface</p>

        <div class="themeOptionGrid" role="radiogroup" aria-label="Sistema de cores">

          <button class="themeOption selected" type="button" id="opt-dark"
                  onclick="selectColorScheme('dark')" aria-pressed="true">
            <div class="themeOptionPreview themeOptionPreview--dark" aria-hidden="true">
              <div class="themeOptionPreviewSidebar">
                <div class="themeOptionPreviewSidebarDot active"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
              </div>
              <div class="themeOptionPreviewMain">
                <div class="themeOptionPreviewBar"></div>
                <div class="themeOptionPreviewArea"></div>
              </div>
            </div>
            <div class="themeOptionFooter">
              <div class="themeOptionInfo">
                <span class="themeOptionLabel">Tema escuro</span>
                <span class="themeOptionDesc">Interface com fundo escuro</span>
              </div>
              <span class="themeOptionCheck" aria-hidden="true">
                <i data-lucide="check" width="14" height="14"></i>
              </span>
            </div>
          </button>

          <button class="themeOption" type="button" id="opt-light"
                  onclick="selectColorScheme('light')" aria-pressed="false">
            <div class="themeOptionPreview themeOptionPreview--light" aria-hidden="true">
              <div class="themeOptionPreviewSidebar">
                <div class="themeOptionPreviewSidebarDot active"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
              </div>
              <div class="themeOptionPreviewMain">
                <div class="themeOptionPreviewBar"></div>
                <div class="themeOptionPreviewArea"></div>
              </div>
            </div>
            <div class="themeOptionFooter">
              <div class="themeOptionInfo">
                <span class="themeOptionLabel">Tema claro</span>
                <span class="themeOptionDesc">Interface com fundo claro</span>
              </div>
              <span class="themeOptionCheck" aria-hidden="true">
                <i data-lucide="check" width="14" height="14"></i>
              </span>
            </div>
          </button>

        </div>
      </div>

      <hr class="divider" />

      <!-- ── Tema visual ───────────────────────────────────────────────── -->
      <div class="formSection">
        <h2 class="sectionTitle">Tema visual</h2>
        <p class="sectionSubtitle">Escolha o estilo visual da interface</p>

        <div class="themeOptionGrid" role="radiogroup" aria-label="Tema visual">

          <button class="themeOption selected" type="button" id="opt-glass"
                  onclick="selectVisualTheme('glass')" aria-pressed="true">
            <div class="themeOptionPreview themeOptionPreview--glass" aria-hidden="true">
              <div class="themeOptionPreviewSidebar">
                <div class="themeOptionPreviewSidebarDot active"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
              </div>
              <div class="themeOptionPreviewMain">
                <div class="themeOptionPreviewBar"></div>
                <div class="themeOptionPreviewArea"></div>
              </div>
            </div>
            <div class="themeOptionFooter">
              <div class="themeOptionInfo">
                <span class="themeOptionLabel">Glass</span>
                <span class="themeOptionDesc">Superfícies translúcidas com efeito de camada</span>
              </div>
              <span class="themeOptionCheck" aria-hidden="true">
                <i data-lucide="check" width="14" height="14"></i>
              </span>
            </div>
          </button>

          <button class="themeOption" type="button" id="opt-minimal"
                  onclick="selectVisualTheme('minimal')" aria-pressed="false">
            <div class="themeOptionPreview themeOptionPreview--minimal" aria-hidden="true">
              <div class="themeOptionPreviewSidebar">
                <div class="themeOptionPreviewSidebarDot active"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
                <div class="themeOptionPreviewSidebarDot"></div>
              </div>
              <div class="themeOptionPreviewMain">
                <div class="themeOptionPreviewBar"></div>
                <div class="themeOptionPreviewArea"></div>
              </div>
            </div>
            <div class="themeOptionFooter">
              <div class="themeOptionInfo">
                <span class="themeOptionLabel">Minimalista</span>
                <span class="themeOptionDesc">Design limpo e sem efeitos de camada</span>
              </div>
              <span class="themeOptionCheck" aria-hidden="true">
                <i data-lucide="check" width="14" height="14"></i>
              </span>
            </div>
          </button>

        </div>
      </div>

      <!-- ── Footer ────────────────────────────────────────────────────── -->
      <div class="formFooter">
        <button class="btn secondary" type="button">Cancelar</button>
        <button class="btn primary hasLeft" type="button">
          <span class="icon"><i data-lucide="save" width="16" height="16"></i></span>
          Salvar preferências
        </button>
      </div>

    </div>
  </div>
</main>

<script src="shared/sidebar.js"></script>
<script>
  lucide.createIcons();

  // Sincronizar seleção com o tema atual (pode ter sido alterado via sidebar)
  (function syncInitialState() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    if (current === 'light') {
      document.getElementById('opt-dark').classList.remove('selected');
      document.getElementById('opt-dark').setAttribute('aria-pressed', 'false');
      document.getElementById('opt-light').classList.add('selected');
      document.getElementById('opt-light').setAttribute('aria-pressed', 'true');
    }
  })();

  function selectColorScheme(scheme) {
    var isDark = scheme === 'dark';
    document.getElementById('opt-dark').classList.toggle('selected', isDark);
    document.getElementById('opt-dark').setAttribute('aria-pressed', String(isDark));
    document.getElementById('opt-light').classList.toggle('selected', !isDark);
    document.getElementById('opt-light').setAttribute('aria-pressed', String(!isDark));
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('althus-theme', isDark ? 'dark' : 'light');
    // Atualizar ícone de tema na sidebar
    var themeIcon = document.getElementById('theme-icon');
    var themeBtn  = document.getElementById('theme-btn');
    if (themeIcon && themeBtn) {
      var nextIcon  = isDark ? 'sun' : 'moon';
      var nextLabel = isDark ? 'Modo claro' : 'Modo escuro';
      themeIcon.innerHTML = '<i data-lucide="' + nextIcon + '" width="16" height="16"></i>';
      themeBtn.setAttribute('aria-label', nextLabel);
      themeBtn.setAttribute('title', nextLabel);
      if (window.lucide) lucide.createIcons();
    }
  }

  function selectVisualTheme(theme) {
    var isGlass = theme === 'glass';
    document.getElementById('opt-glass').classList.toggle('selected', isGlass);
    document.getElementById('opt-glass').setAttribute('aria-pressed', String(isGlass));
    document.getElementById('opt-minimal').classList.toggle('selected', !isGlass);
    document.getElementById('opt-minimal').setAttribute('aria-pressed', String(!isGlass));
  }
</script>

</body>
</html>
