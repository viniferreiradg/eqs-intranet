<body data-page="usuarios">

<!-- ── Sidebar ── -->
<aside id="sidebar-root"></aside>

<!-- ── Main ── -->
<main class="main bgWrapper" id="main">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <!-- Page header -->
  <div class="pageHeader">
    <div>
      <h1 class="pageTitle">Gestão de Perfis</h1>
      <p class="pageSubtitle">Configure perfis de acesso e permissões dos usuários</p>
    </div>
  </div>

  <!-- Tab nav -->
  <div class="tabNav">
    <div class="tabList" role="tablist">
      <button class="tabBtn tabLeft" role="tab" aria-selected="false" onclick="location.href='jornada-2-6-4-gestao-de-perfis.html'">Lista de Perfis</button>
      <button class="tabBtn tabBtnActive tabRight" role="tab" aria-selected="true">Permissões</button>
    </div>
  </div>

  <!-- Content -->
  <div class="pageContent">

    <div class="feedbackWrap" id="feedback-wrap">
      <div class="alert success" role="alert">
        <span style="flex-shrink: 0; margin-top: 1px;">
          <i data-lucide="circle-check" width="18" height="18"></i>
        </span>
        <div class="body">
          <div class="title">Permissões salvas com sucesso!</div>
          <div class="message">As alterações já estão em vigor para todos os usuários.</div>
        </div>
        <button class="dismiss" aria-label="Fechar" onclick="document.getElementById('feedback-wrap').classList.remove('visible')">
          <i data-lucide="x" width="14" height="14"></i>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="tableWrap">
        <table class="table" aria-label="Matriz de permissões por perfil">
          <thead>
            <tr class="headerRow">
              <th class="th thFirst" style="width: 160px;">Perfil</th>
              <th class="th thModule">Dashboard</th>
              <th class="th thModule">Locais</th>
              <th class="th thModule">Carregadores</th>
              <th class="th thModule">Tarifas</th>
              <th class="th thModule">Cupons</th>
              <th class="th thModule">Extrato</th>
              <th class="th thModule">Logs</th>
              <th class="th thModule">Usuários</th>
            </tr>
          </thead>
          <tbody>

            <!-- Administrador: acesso total -->
            <tr class="tr">
              <td class="td tdFirst">Administrador</td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
            </tr>

            <!-- Financeiro: Dashboard, Tarifas, Cupons, Extrato -->
            <tr class="tr">
              <td class="td tdFirst">Financeiro</td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
            </tr>

            <!-- Operacional: Dashboard, Locais, Carregadores, Logs -->
            <tr class="tr">
              <td class="td tdFirst">Operacional</td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
            </tr>

            <!-- Visualizador: apenas Dashboard -->
            <tr class="tr">
              <td class="td tdFirst">Visualizador</td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper checked"><input type="checkbox" class="input" checked /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>
              <td class="td tdModule"><div class="cbCell"><label class="wrapper"><input type="checkbox" class="input" /><span class="box"><span class="mark">✓</span></span></label></div></td>

      <div class="tableFooter">
        <button class="btn ghost" onclick="location.href='jornada-2-6-4-gestao-de-perfis.html'">Cancelar</button>
        <button class="btn primary" id="save-btn">Salvar permissões</button>
      </div>
    </div>

  </div>
</main>

<script src="shared/sidebar.js"></script>
<script>

  /* Sync .checked class com estado real do checkbox */
  document.querySelectorAll('.table .wrapper input[type="checkbox"]').forEach(input => {
    input.addEventListener('change', () => {
      input.closest('.wrapper').classList.toggle('checked', input.checked);
    });
  });

  /* Save feedback */
  document.getElementById('save-btn').addEventListener('click', () => {
    const feedbackWrap = document.getElementById('feedback-wrap');
    feedbackWrap.classList.add('visible');
    document.querySelector('.pageContent').scrollTop = 0;
    lucide.createIcons();
  });

  lucide.createIcons();
</script>

</body>
</html>
