<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />

  <!-- ── Viewport: fills full iPhone screen, no clipping ─── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>EQS Intranet</title>

  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />

  <!-- ── PWA / Add-to-Home-Screen (iOS) ──────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EQS Intranet" />
  <meta name="theme-color" content="#0a0a0b" />
  <link rel="manifest" href="manifest.json" />

  <!-- ── Design tokens (needed by screen iframes) ─────────── -->
  <link rel="stylesheet" href="../componentes/tokens/tokens.css" />

  <!-- ── Transition animations ────────────────────────────── -->
  <link rel="stylesheet" href="../shared/transitions.css" />

  <!-- ── BottomNav component ──────────────────────────────── -->
  <link rel="stylesheet" href="../componentes/BottomNav/BottomNav.module.css" />

  <!-- ── Lucide icons ─────────────────────────────────────── -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0b;
      /* Use dvh so the body adapts when iOS browser chrome shows/hides */
      height: 100dvh;
    }

    body {
      display: flex;
      flex-direction: column;
      /* Push content below the iOS status bar (notch / dynamic island) */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #screen-container {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #bottom-nav {
      flex-shrink: 0;
      /* bottomNav component already has its own background/border */
    }
  </style>
</head>
<body>

  <!-- ── Screen container (router mounts partials here) ───── -->
  <div id="screen-container"></div>

  <!-- ── Bottom navigation ────────────────────────────────── -->
  <nav id="bottom-nav" class="bottomNav" hidden aria-label="Navegação principal">
    <button class="navItem navActive" data-tab="mapa"
            onclick="router.tab('jornada-1-4-1-home-map')"
            aria-label="Mapa" aria-current="page">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="postos"
            onclick="router.tab('jornada-1-4-lista-postos')"
            aria-label="Postos">
      <span class="navIcon"><i data-lucide="ev-charger" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="historico"
            onclick="router.tab('jornada-1-5-1-historico-lista')"
            aria-label="Histórico">
      <span class="navIcon"><i data-lucide="clock" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="carteira"
            onclick="router.tab('jornada-1-6-1-carteira')"
            aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil"
            onclick="router.tab('jornada-1-7-1-perfil')"
            aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <!-- ── Router ───────────────────────────────────────────── -->
  <script src="router.js"></script>

  <script>
    lucide.createIcons();
    router.init('jornada-1-2-0-splash');
  </script>

</body>
</html>
