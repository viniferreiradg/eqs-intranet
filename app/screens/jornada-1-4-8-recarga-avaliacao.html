<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recarga concluída — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer ────────────────────────────────────────── -->
  <div class="map-pins-layer" id="map-pins-layer">

    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="map-pin-center">
      <svg class="mapPin md brand selected" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-center map-pin-center-2 pin-brand">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Carregador">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay ───────────────────────────────────── -->
  <div class="map-top-overlay"></div>

  <!-- ── Modal sobre o mapa ────────────────────────────── -->
  <div class="map-modal-overlay">
    <div class="modal">

      <div class="modalHeader">
        <div class="modalHeaderStart">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
            <i data-lucide="chevron-left" width="20" height="20"></i>
          </button>
        </div>
        <div class="modalHeaderCenter">
          <h2 class="modalTitle">Recarga concluída</h2>
        </div>
        <div class="modalHeaderEnd">
          <button class="modalNavBtn" onclick="router.replace('jornada-1-4-1-home-map')" aria-label="Fechar">
            <i data-lucide="x" width="18" height="18"></i>
          </button>
        </div>
      </div>

      <div class="modalBody">

        <!-- Hero de conclusão -->
        <div class="sheet-complete-hero">
          <div class="success-hero__icon" aria-hidden="true">
            <i data-lucide="zap" width="32" height="32"></i>
          </div>
          <h2 class="success-hero__title">Recarga concluída!</h2>
          <p class="success-hero__desc">Auto Shopping Eixo · Ponto #3</p>
        </div>

        <p class="sheet-complete-message">Cada recarga ajuda a reduzir emissões de CO² no mundo. Obrigado por fazer parte disso.</p>

        <!-- Resumo: kWh + débito -->
        <div class="recarga-estimate-card">
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value">18,9 kWh</span>
            <span class="recarga-estimate-label">Energia carregada</span>
          </div>
          <div class="recarga-estimate-divider" aria-hidden="true"></div>
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value--secondary">R$ 19,00</span>
            <span class="recarga-estimate-label">Débito na carteira</span>
          </div>
        </div>

        <!-- Avaliação -->
        <p class="sheet-section-label">Como foi a sua experiência?</p>

        <div class="avaliar-stars" role="group" aria-label="Avaliação em estrelas">
          <button class="avaliar-star" type="button" aria-label="1 estrela" onclick="setRating(1)">
            <i data-lucide="star" width="32" height="32"></i>
          </button>
          <button class="avaliar-star" type="button" aria-label="2 estrelas" onclick="setRating(2)">
            <i data-lucide="star" width="32" height="32"></i>
          </button>
          <button class="avaliar-star" type="button" aria-label="3 estrelas" onclick="setRating(3)">
            <i data-lucide="star" width="32" height="32"></i>
          </button>
          <button class="avaliar-star" type="button" aria-label="4 estrelas" onclick="setRating(4)">
            <i data-lucide="star" width="32" height="32"></i>
          </button>
          <button class="avaliar-star" type="button" aria-label="5 estrelas" onclick="setRating(5)">
            <i data-lucide="star" width="32" height="32"></i>
          </button>
        </div>

        <!-- Descrição livre da avaliação -->
        <div class="wrapper">
          <label class="label" for="avaliacao-desc">Descreva sua experiência (opcional)</label>
          <div class="inputWrap">
            <textarea class="input review-textarea" id="avaliacao-desc" placeholder="Conte como foi..." rows="3"></textarea>
          </div>
        </div>

      </div><!-- /modalBody -->

      <div class="botoes-sheet">
        <button class="btn primary full-width" type="button"
                onclick="router.replace('jornada-1-4-1-home-map')"
                aria-label="Concluir e voltar ao mapa">
          Concluir
        </button>
      </div>

    </div><!-- /modal -->
  </div><!-- /map-modal-overlay -->

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var LABELS = ['', 'Péssimo', 'Ruim', 'Regular', 'Bom', 'Excelente'];

    function setRating(n) {
      document.querySelectorAll('.avaliar-star').forEach(function(star, i) {
        star.classList.toggle('selected', i < n);
      });
    }
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
