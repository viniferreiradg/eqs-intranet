<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar recarga — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Card/Card.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Chip/Chip.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <!-- ── AppBar ─────────────────────────────────────── -->
  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Confirmar recarga</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Conteúdo ───────────────────────────────────── -->
  <main class="scroll-area">
    <div class="recarga-confirm-scroll">

      <!-- Carregador identificado -->
      <div>
        <p class="recarga-section-label">Carregador identificado</p>
        <div class="card recarga-charger-card">
          <div class="recarga-charger-icon">
            <i data-lucide="zap" width="22" height="22"></i>
          </div>
          <div class="recarga-charger-body">
            <span class="recarga-charger-name">Auto Shopping Eixo</span>
            <span class="recarga-charger-meta">Ponto #3 · CCS2 · 50 kW</span>
          </div>
          <span class="reserva-badge reserva-badge--ativa">Disponível</span>
        </div>
      </div>

      <!-- Duração -->
      <div>
        <p class="recarga-section-label">Duração da recarga</p>
        <div class="chipGroup">
          <label class="chip">
            <input type="radio" name="duration" value="30" onchange="updateEstimate(30)" />
            30 min
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="60" checked onchange="updateEstimate(60)" />
            1 hora
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="90" onchange="updateEstimate(90)" />
            1h 30min
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="120" onchange="updateEstimate(120)" />
            2 horas
          </label>
        </div>
      </div>

      <!-- Estimativa dinâmica -->
      <div>
        <p class="recarga-section-label">Estimativa</p>
        <div class="card recarga-estimate-card">
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value" id="est-valor">R$ 19,00</span>
            <span class="recarga-estimate-label">Valor estimado</span>
          </div>
          <div class="recarga-estimate-divider" aria-hidden="true"></div>
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value--secondary" id="est-kwh">~18,9 kWh</span>
            <span class="recarga-estimate-label">Energia estimada</span>
          </div>
        </div>
      </div>

      <!-- Pagamento -->
      <div>
        <p class="recarga-section-label">Pagamento</p>
        <div class="wallet-balance-row">
          <div class="wallet-balance-row__left">
            <div class="wallet-balance-row__icon">
              <i data-lucide="wallet" width="18" height="18"></i>
            </div>
            <div>
              <p class="wallet-balance-row__label">Saldo da carteira</p>
              <p class="wallet-balance-row__amount">R$ 4,20</p>
            </div>
          </div>
          <span class="wallet-status-badge wallet-status-badge--low">Insuficiente</span>
        </div>
        <button class="btn secondary" type="button" style="margin-top: 16px; width: 100%;"
        onclick="router.push('jornada-1-6-2-carteira-pix')">
  <span class="icon"><i data-lucide="plus" width="16" height="16"></i></span>
  Adicionar saldo à carteira
</button>
      </div>

    </div>
  </main>

  <!-- ── Footer com CTA ────────────────────────────── -->
  <div class="recarga-footer">
    <button class="btn primary" type="button" disabled>
      <span class="icon"><i data-lucide="zap" width="16" height="16"></i></span>
      Iniciar recarga
    </button>
  </div>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem navActive" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa" aria-current="page">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="notifBadge">2</span>
        <i data-lucide="bell" width="22" height="22"></i>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var estimativas = {
      30:  { valor: 'R$ 9,50',  kwh: '~9,5 kWh'  },
      60:  { valor: 'R$ 19,00', kwh: '~18,9 kWh' },
      90:  { valor: 'R$ 28,50', kwh: '~28,4 kWh' },
      120: { valor: 'R$ 38,00', kwh: '~37,8 kWh' },
    };

    function updateEstimate(mins) {
      var est = estimativas[mins];
      document.getElementById('est-valor').textContent = est.valor;
      document.getElementById('est-kwh').textContent   = est.kwh;
    }
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
