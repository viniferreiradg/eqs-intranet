<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/InputAction/InputAction.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/OTPInput/OTPInput.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen login-screen">

  <div class="modal">

    <div class="modal-header">
      <div class="modal-header-start"></div>
      <div class="modal-header-center">
        <h2 class="modal-title">Junte-se a nós</h2>
      </div>
      <div class="modal-header-end">
        <button class="modal-nav-btn" onclick="router.pop()" aria-label="Fechar">
          <i data-lucide="x" width="18" height="18"></i>
        </button>
      </div>
    </div>

    <div class="modal-body">

      <p class="modal-desc">Rápido e simples.</p>

      <!-- Telefone + enviar código -->
      <div class="iaWrapper">
        <span class="iaLabel">Seu número de telefone</span>
        <div class="iaInputWrap">
          <input class="iaInput" id="cadastro-telefone" type="tel"
                 placeholder="Ex.: (48) 99945-9453" autocomplete="tel" />
          <button class="iaActionBtn" id="btn-enviar-codigo" type="button" onclick="enviarCodigo()">
            Enviar código
          </button>
        </div>
      </div>

      <!-- Código de verificação -->
      <div class="wrapper">
        <label class="label">Insira o código de verificação</label>
        <div class="otpRoot" id="otp-verificacao">
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <!-- CPF -->
      <div class="wrapper">
        <label class="label" for="cadastro-cpf">CPF</label>
        <div class="inputWrap">
          <input class="input" id="cadastro-cpf" type="text"
                 placeholder="Ex: 094.426.874-74" inputmode="numeric" autocomplete="off" />
        </div>
      </div>

      <!-- PIN -->
      <div class="wrapper">
        <label class="label">Crie seu PIN</label>
        <div class="otpRoot" id="otp-pin">
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <!-- Confirmar PIN -->
      <div class="wrapper">
        <label class="label">Confirme seu PIN</label>
        <div class="otpRoot" id="otp-pin-confirm">
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="password" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <p class="modal-legal">
        Ao continuar você concorda com os Termos de Uso e Privacidade, e comunicações da Althus.
      </p>

      <button class="btn primary full-width" onclick="router.replace('jornada-1-4-0-map-loading')">
        Continuar
      </button>

    </div>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>
    lucide.createIcons();

    function enviarCodigo() {
      var btn = document.getElementById('btn-enviar-codigo');
      btn.textContent = 'Código enviado';
      btn.classList.add('sent');
      btn.disabled = true;
    }

    document.querySelectorAll('.otpRoot').forEach(function(root) {
      var cells = root.querySelectorAll('.otpCell');
      cells.forEach(function(cell, i) {
        cell.addEventListener('input', function() {
          if (cell.value.length >= 1 && i < cells.length - 1) cells[i + 1].focus();
          cell.classList.toggle('filled', cell.value.length > 0);
        });
        cell.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && cell.value === '' && i > 0) cells[i - 1].focus();
        });
      });
    });
  </script>

</body>
</html>
