<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/InputAction/InputAction.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/OTPInput/OTPInput.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen login-screen">

  <div class="modal">

    <div class="modalHeader">
      <div class="modalHeaderStart">
        <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
          <i data-lucide="chevron-left" width="20" height="20"></i>
        </button>
      </div>
      <div class="modalHeaderCenter">
        <h2 class="modalTitle">Junte-se a nós</h2>
      </div>
      <div class="modalHeaderEnd">
        <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
          <i data-lucide="x" width="18" height="18"></i>
        </button>
      </div>
    </div>

    <div class="modalBody">

      <p class="modalDesc">Rápido e simples.</p>

      <!-- Etapa 1: Telefone — habilitado desde o início -->
      <div class="iaWrapper" id="section-telefone">
        <span class="iaLabel">Seu número de telefone</span>
        <div class="iaInputWrap">
          <input class="iaInput" id="cadastro-telefone" type="tel"
                 placeholder="Ex.: (48) 99945-9453" autocomplete="tel" />
          <button class="iaActionBtn" id="btn-enviar-codigo" type="button" onclick="enviarCodigo()">
            Enviar código
          </button>
        </div>
      </div>

      <!-- Etapa 2: Código de verificação -->
      <div class="wrapper step-locked" id="section-otp-verificacao">
        <label class="label">Insira o código de verificação</label>
        <div class="otpRoot" id="otp-verificacao">
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
          <input class="otpCell" type="number" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <!-- Etapa 3: CPF -->
      <div class="wrapper step-locked" id="section-cpf">
        <label class="label" for="cadastro-cpf">CPF</label>
        <div class="inputWrap">
          <input class="input" id="cadastro-cpf" type="text"
                 placeholder="Ex: 094.426.874-74" inputmode="numeric" autocomplete="off" />
        </div>
      </div>

      <!-- Etapa 4: PIN -->
      <div class="wrapper step-locked" id="section-pin">
        <label class="label">Crie seu PIN</label>
        <div class="otpRoot" id="otp-pin">
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <!-- Etapa 5: Confirmar PIN -->
      <div class="wrapper step-locked" id="section-pin-confirm">
        <label class="label">Confirme seu PIN</label>
        <div class="otpRoot" id="otp-pin-confirm">
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
          <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <!-- Etapa 6: Footer — legal + botão -->
      <div id="section-footer" class="step-locked">
        <p class="modalLegal" style="padding:16px 0;">
          Ao continuar você concorda com os Termos de Uso e Privacidade, e comunicações da Althus.
        </p>
        <button class="btn primary full-width" id="btn-continuar"
                onclick="router.replace('jornada-1-4-0-map-loading')">
          Continuar
        </button>
      </div>

    </div>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>
    lucide.createIcons();

    function unlock(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('step-locked');
    }

    // Etapa 1 → 2: enviar código habilita OTP de verificação
    function enviarCodigo() {
      var tel = document.getElementById('cadastro-telefone').value.trim();
      if (!tel) return;
      var btn = document.getElementById('btn-enviar-codigo');
      btn.textContent = 'Código enviado';
      btn.classList.add('sent');
      btn.disabled = true;
      unlock('section-otp-verificacao');
      document.querySelector('#otp-verificacao .otpCell').focus();
    }

    // Etapa 2 → 3: OTP completo habilita CPF
    function onOtpVerificacaoComplete() {
      unlock('section-cpf');
      document.getElementById('cadastro-cpf').focus();
    }

    // Máscaras
    function applyPhoneMask(v) {
      var d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length <= 2)  return '(' + d;
      if (d.length <= 7)  return '(' + d.slice(0,2) + ') ' + d.slice(2);
      return '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7);
    }
    function applyCpfMask(v) {
      var d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length <= 3)  return d;
      if (d.length <= 6)  return d.slice(0,3) + '.' + d.slice(3);
      if (d.length <= 9)  return d.slice(0,3) + '.' + d.slice(3,6) + '.' + d.slice(6);
      return d.slice(0,3) + '.' + d.slice(3,6) + '.' + d.slice(6,9) + '-' + d.slice(9);
    }

    document.getElementById('cadastro-telefone').addEventListener('input', function() {
      this.value = applyPhoneMask(this.value);
    });

    // Etapa 3 → 4: CPF com 11 dígitos habilita PIN
    document.getElementById('cadastro-cpf').addEventListener('input', function() {
      this.value = applyCpfMask(this.value);
      if (this.value.replace(/\D/g, '').length >= 11) {
        unlock('section-pin');
        document.querySelector('#otp-pin .otpCell').focus();
      }
    });

    // Etapa 4 → 5: PIN completo habilita confirmar PIN
    function onOtpPinComplete() {
      unlock('section-pin-confirm');
      document.querySelector('#otp-pin-confirm .otpCell').focus();
    }

    // Etapa 5 → 6: confirmar PIN completo habilita botão
    function onOtpPinConfirmComplete() {
      unlock('section-footer');
    }

    // OTP navegação + filled + callbacks de completude
    function setupOtp(rootId, onComplete) {
      var root = document.getElementById(rootId);
      var cells = root.querySelectorAll('.otpCell');
      cells.forEach(function(cell, i) {
        cell.addEventListener('input', function() {
          // limita a 1 caractere
          if (cell.value.length > 1) cell.value = cell.value.slice(-1);
          cell.classList.toggle('filled', cell.value.length > 0);
          if (cell.value.length > 0 && i < cells.length - 1) cells[i + 1].focus();
          // verifica completude
          var complete = Array.from(cells).every(function(c) { return c.value.length > 0; });
          if (complete && onComplete) onComplete();
        });
        cell.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && cell.value === '' && i > 0) cells[i - 1].focus();
        });
      });
    }

    setupOtp('otp-verificacao', onOtpVerificacaoComplete);
    setupOtp('otp-pin',         onOtpPinComplete);
    setupOtp('otp-pin-confirm', onOtpPinConfirmComplete);
  </script>

</body>
</html>
