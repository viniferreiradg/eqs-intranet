<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicionar Saldo via PIX — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/RadioButton/RadioButton.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Adicionar saldo</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Estado 1: digitar valor ───────────────────────── -->
  <div id="state-input" class="cadastro-body">

    <div class="amount-input-wrapper">
      <span class="amount-input-label">Valor a depositar</span>
      <div class="amount-input-row">
        <span class="amount-input-currency">R$</span>
        <input
          class="amount-input-field"
          id="pix-amount"
          type="number"
          inputmode="decimal"
          placeholder="0,00"
          min="1"
          aria-label="Valor a depositar"
        />
      </div>
    </div>

    <div class="group group--card" role="radiogroup" aria-label="Valor sugerido">

      <label class="option option--card" onclick="selectAmount(this, 50)">
        <input class="input" type="radio" name="pix-preset" value="50" />
        <span class="optionLabel">R$ 50,00</span>
        <span class="circle"><span class="dot"></span></span>
      </label>

      <label class="option option--card" onclick="selectAmount(this, 100)">
        <input class="input" type="radio" name="pix-preset" value="100" />
        <span class="optionLabel">R$ 100,00</span>
        <span class="circle"><span class="dot"></span></span>
      </label>

      <label class="option option--card" onclick="selectAmount(this, 200)">
        <input class="input" type="radio" name="pix-preset" value="200" />
        <span class="optionLabel">R$ 200,00</span>
        <span class="circle"><span class="dot"></span></span>
      </label>

      <label class="option option--card" onclick="selectAmount(this, 500)">
        <input class="input" type="radio" name="pix-preset" value="500" />
        <span class="optionLabel">R$ 500,00</span>
        <span class="circle"><span class="dot"></span></span>
      </label>

      <label class="option option--card" onclick="selectCustom(this)">
        <input class="input" type="radio" name="pix-preset" value="custom" />
        <span class="optionLabel">Outro valor</span>
        <span class="circle"><span class="dot"></span></span>
      </label>

    </div>

    <div class="custom-amount-wrap" id="custom-amount-wrap">
      <input class="custom-amount-input" id="custom-amount"
             type="text" inputmode="numeric"
             placeholder="R$ 0,00" autocomplete="off"
             aria-label="Valor personalizado" />
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary full-width" type="button"
            onclick="router.push('jornada-1-6-3-carteira-pix-qr')">
      <i data-lucide="qr-code" width="16" height="16"></i>
      Gerar QR Code
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    function selectAmount(el, val) {
      document.querySelectorAll('.option--card').forEach(function(o) {
        o.classList.remove('checked');
      });
      el.classList.add('checked');
      document.getElementById('pix-amount').value = val;
      /* esconde input customizado */
      var wrap = document.getElementById('custom-amount-wrap');
      wrap.classList.remove('visible');
      document.getElementById('custom-amount').value = '';
    }

    function selectCustom(el) {
      document.querySelectorAll('.option--card').forEach(function(o) {
        o.classList.remove('checked');
      });
      el.classList.add('checked');
      document.getElementById('pix-amount').value = '';
      var wrap = document.getElementById('custom-amount-wrap');
      wrap.classList.add('visible');
      /* após a transição: remove overflow:hidden para não cortar borda/sombra */
      wrap.addEventListener('transitionend', function handler() {
        wrap.classList.add('custom-amount-wrap--open');
        wrap.removeEventListener('transitionend', handler);
      });
      setTimeout(function() { document.getElementById('custom-amount').focus(); }, 220);
    }

    /* Máscara BRL: digita centavos e formata R$ 0,00 */
    document.getElementById('custom-amount').addEventListener('input', function () {
      var digits = this.value.replace(/\D/g, '').slice(0, 10);
      if (!digits) { this.value = ''; document.getElementById('pix-amount').value = ''; return; }
      digits = digits.padStart(3, '0');
      var intPart = digits.slice(0, -2).replace(/^0+/, '') || '0';
      var decPart = digits.slice(-2);
      intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      this.value = 'R$ ' + intPart + ',' + decPart;
      document.getElementById('pix-amount').value =
        parseFloat(intPart.replace(/\./g, '') + '.' + decPart);
    });

    function showQR() {
      document.getElementById('state-input').hidden = true;
      document.getElementById('footer-input').hidden = true;
      document.getElementById('state-qr').hidden = false;
      document.getElementById('footer-qr').hidden = false;
      lucide.createIcons();
      startTimer();
    }

    function showInput() {
      document.getElementById('state-qr').hidden = true;
      document.getElementById('footer-qr').hidden = true;
      document.getElementById('state-input').hidden = false;
      document.getElementById('footer-input').hidden = false;
    }

    function copyPix() {
      var key = document.getElementById('pix-key').textContent.trim();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(key);
      }
      var btn = document.querySelector('.pix-copy-box__btn');
      var original = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="check" width="14" height="14"></i> Copiado';
      lucide.createIcons();
      setTimeout(function() { btn.innerHTML = original; lucide.createIcons(); }, 2000);
    }

    var timerInterval = null;
    function startTimer() {
      var seconds = 599;
      clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        if (seconds <= 0) { clearInterval(timerInterval); return; }
        seconds--;
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        document.getElementById('pix-timer').textContent =
          (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    }
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem navActive" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira" aria-current="page">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
