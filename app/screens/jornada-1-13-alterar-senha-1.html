<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alterar senha — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/OTPInput/OTPInput.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Alterar senha</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <main class="scroll-area">
    <div class="screen-content">

      <div class="otp-info-block">
        <p class="otp-info-text">
          Por questão de segurança, enviamos um código por SMS para o seu celular cadastrado.
        </p>
      </div>

      <div class="otpRoot" id="otp-root" role="group" aria-label="Código de verificação">
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" autocomplete="one-time-code" aria-label="Dígito 1 de 6" />
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" aria-label="Dígito 2 de 6" />
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" aria-label="Dígito 3 de 6" />
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" aria-label="Dígito 4 de 6" />
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" aria-label="Dígito 5 de 6" />
        <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
               placeholder="·" aria-label="Dígito 6 de 6" />
      </div>

      <button class="btn primary full-width" id="btn-verificar" disabled
              onclick="router.push('jornada-1-13-alterar-senha-2')">
        Verificar
      </button>

      <p class="otp-resend">
        Não recebeu o código?
        <button type="button" class="otp-resend-link" id="btn-reenviar">Reenviar código</button>
      </p>

    </div>
  </main>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="notifBadge">3</span>
        <i data-lucide="bell" width="22" height="22"></i>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    (function () {
      var cells   = Array.from(document.querySelectorAll('#otp-root .otpCell'));
      var btnVerif = document.getElementById('btn-verificar');
      var btnReenv = document.getElementById('btn-reenviar');

      function markFilled(cell) {
        cell.classList.toggle('filled', cell.value.length > 0);
      }

      function checkComplete() {
        btnVerif.disabled = !cells.every(function(c) { return c.value.length > 0; });
      }

      function focusCell(i) {
        if (cells[i]) cells[i].focus();
      }

      cells.forEach(function (cell, i) {
        cell.addEventListener('input', function () {
          var digit = cell.value.replace(/\D/g, '').slice(-1);
          cell.value = digit;
          markFilled(cell);
          if (digit && i < cells.length - 1) focusCell(i + 1);
          checkComplete();
        });

        cell.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace') {
            if (cell.value) {
              cell.value = '';
              markFilled(cell);
            } else if (i > 0) {
              focusCell(i - 1);
              cells[i - 1].value = '';
              markFilled(cells[i - 1]);
            }
            checkComplete();
            e.preventDefault();
          } else if (e.key === 'ArrowLeft' && i > 0) {
            focusCell(i - 1);
          } else if (e.key === 'ArrowRight' && i < cells.length - 1) {
            focusCell(i + 1);
          }
        });

        cell.addEventListener('paste', function (e) {
          e.preventDefault();
          var pasted = (e.clipboardData || window.clipboardData)
            .getData('text').replace(/\D/g, '').slice(0, cells.length - i);
          for (var j = 0; j < pasted.length; j++) {
            cells[i + j].value = pasted[j];
            markFilled(cells[i + j]);
          }
          focusCell(Math.min(i + pasted.length, cells.length - 1));
          checkComplete();
        });

        cell.addEventListener('focus', function () { cell.select(); });
      });

      /* Reenviar com cooldown de 60s */
      var cooldown = 0;
      var timer = null;

      btnReenv.addEventListener('click', function () {
        if (cooldown > 0) return;
        cooldown = 60;
        btnReenv.disabled = true;
        btnReenv.textContent = 'Reenviar em 60s';
        timer = setInterval(function () {
          cooldown--;
          if (cooldown <= 0) {
            clearInterval(timer);
            btnReenv.disabled = false;
            btnReenv.textContent = 'Reenviar código';
          } else {
            btnReenv.textContent = 'Reenviar em ' + cooldown + 's';
          }
        }, 1000);
      });
    }());
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
