<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esqueci minha senha — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">


  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Esqueci minha senha</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="screen-content">

    <p class="screen-description">
      Informe o e-mail cadastrado na sua conta. Vamos enviar um código para redefinir a sua senha.
    </p>

    <div class="wrapper hasLeft">
      <label class="label" for="canal-email">E-mail</label>
      <div class="inputWrap">
        <span class="iconLeft"><i data-lucide="mail" width="16" height="16"></i></span>
        <input class="input" id="canal-email" type="email"
               placeholder="seu@email.com" autocomplete="email" />
      </div>
    </div>

    <button class="btn primary full-width" onclick="router.push('jornada-1-3-2-recuperar-otp')">
      Enviar código
    </button>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
