<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esqueci minha senha — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen login-screen">

  <div class="modal">

    <div class="modalHeader">
      <div class="modalHeaderStart">
        <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
          <i data-lucide="chevron-left" width="20" height="20"></i>
        </button>
      </div>
      <div class="modalHeaderCenter">
        <h2 class="modalTitle">Esqueci minha senha</h2>
      </div>
      <div class="modalHeaderEnd">
        <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
          <i data-lucide="x" width="18" height="18"></i>
        </button>
      </div>
    </div>

    <div class="modalBody">

      <p class="modalDesc">Informe o telefone cadastrado na sua conta. Vamos enviar um código para redefinir a sua senha.</p>

      <div class="wrapper hasLeft">
        <label class="label" for="canal-telefone">Telefone</label>
        <div class="inputWrap">
          <span class="iconLeft"><i data-lucide="smartphone" width="16" height="16"></i></span>
          <input class="input" id="canal-telefone" type="tel"
                 placeholder="(00) 00000-0000" autocomplete="tel" inputmode="numeric" />
        </div>
      </div>

      <button class="btn primary full-width" onclick="router.push('jornada-1-3-2-recuperar-otp')">
        Enviar código
      </button>

    </div>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    document.getElementById('canal-telefone').addEventListener('input', function (e) {
      var v = e.target.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 6) v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
      else if (v.length > 2) v = '(' + v.slice(0,2) + ') ' + v.slice(2);
      else if (v.length > 0) v = '(' + v;
      e.target.value = v;
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
