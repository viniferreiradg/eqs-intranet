<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes da recarga — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Card/Card.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <!-- ── AppBar ─────────────────────────────────────── -->
  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Recarga em andamento</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Conteúdo ───────────────────────────────────── -->
  <main class="scroll-area">
    <div class="recarga-confirm-scroll">

      <!-- Carregador ativo -->
      <div class="card recarga-charger-card">
        <div class="charging-bar__icon" aria-hidden="true">
          <i data-lucide="zap" width="20" height="20"></i>
        </div>
        <div class="recarga-charger-body">
          <span class="recarga-charger-name">Auto Shopping Eixo</span>
          <span class="recarga-charger-meta">Ponto #3 · CCS2 · 50 kW</span>
        </div>
        <span class="reserva-badge reserva-badge--recarga">Em recarga</span>
      </div>

      <!-- Hero: tempo restante + progresso -->
      <div class="card">
        <div class="charging-time-hero">
          <span class="charging-time-value" id="detail-timer">37:00</span>
          <span class="charging-time-label">restantes</span>
        </div>
        <div class="charging-progress">
          <div class="charging-progress-track" role="progressbar"
               aria-label="Progresso da recarga"
               aria-valuemin="0" aria-valuemax="100">
            <div class="charging-progress-fill" id="charging-fill"></div>
          </div>
          <div class="charging-progress-labels" aria-hidden="true">
            <span>Iniciado</span>
            <span>1 hora</span>
          </div>
        </div>
      </div>

      <!-- Stats 2×2 -->
      <div class="charging-stats">
        <div class="charging-stat-card">
          <span class="charging-stat-label">kWh carregados</span>
          <span class="charging-stat-value charging-stat-value--brand" id="detail-kwh">7,2 kWh</span>
        </div>
        <div class="charging-stat-card">
          <span class="charging-stat-label">Velocidade</span>
          <span class="charging-stat-value">50 kW</span>
        </div>
        <div class="charging-stat-card">
          <span class="charging-stat-label">Custo atual</span>
          <span class="charging-stat-value" id="detail-cost">R$ 7,28</span>
        </div>
        <div class="charging-stat-card">
          <span class="charging-stat-label">Tempo total</span>
          <span class="charging-stat-value">1 hora</span>
        </div>
      </div>

    </div>
  </main>

  <!-- ── Footer: parar recarga ─────────────────────── -->
  <div class="recarga-footer">
    <button class="btn destructive hasLeft" type="button"
            onclick="router.replace('jornada-1-4-1-home-map')"
            aria-label="Parar recarga">
      <span class="icon"><i data-lucide="square" width="16" height="16"></i></span>
      Parar recarga
    </button>
  </div>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem navActive" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa" aria-current="page">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="notifBadge" aria-hidden="true">2</span>
        <i data-lucide="bell" width="22" height="22"></i>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    // ── Contador e progresso ──────────────────────────
    var TOTAL_SECS = 60 * 60;         // 1 hora = 3600 s
    var remaining  = 37 * 60;         // começa em 37:00
    var elapsed    = TOTAL_SECS - remaining; // 23 min já decorridos

    var KWH_RATE  = 18.9  / TOTAL_SECS;  // ~0.00525 kWh/s
    var COST_RATE = 19.00 / TOTAL_SECS;  // ~0.00528 R$/s

    var kwh  = elapsed * KWH_RATE;   // ~7,22 kWh
    var cost = elapsed * COST_RATE;  // ~7,28 R$

    var timerEl = document.getElementById('detail-timer');
    var fillEl  = document.getElementById('charging-fill');
    var kwhEl   = document.getElementById('detail-kwh');
    var costEl  = document.getElementById('detail-cost');

    function pad(n) { return (n < 10 ? '0' : '') + n; }

    function fmtCost(v) {
      return 'R$ ' + v.toFixed(2).replace('.', ',');
    }

    function tick() {
      // Timer
      timerEl.textContent = pad(Math.floor(remaining / 60)) + ':' + pad(remaining % 60);

      // Progress bar (elapsed / total)
      var pct = ((TOTAL_SECS - remaining) / TOTAL_SECS * 100).toFixed(1);
      fillEl.style.width = pct + '%';
      fillEl.parentElement.setAttribute('aria-valuenow', Math.round(pct));

      // kWh e custo
      kwhEl.textContent  = kwh.toFixed(1)  + ' kWh';
      costEl.textContent = fmtCost(cost);

      if (remaining <= 0) {
        clearInterval(iv);
        timerEl.textContent = '00:00';
        fillEl.style.width  = '100%';
        return;
      }

      remaining--;
      kwh  += KWH_RATE;
      cost += COST_RATE;
    }

    tick(); // render imediato antes do primeiro segundo
    var iv = setInterval(tick, 1000);
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
