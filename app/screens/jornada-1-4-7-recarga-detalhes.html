<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes da recarga — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Card/Card.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer ────────────────────────────────────────── -->
  <div class="map-pins-layer" id="map-pins-layer">

    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="map-pin-center">
      <svg class="mapPin md brand selected" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo — Em recarga">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay ───────────────────────────────────── -->
  <div class="map-top-overlay"></div>

  <!-- ── Modal sobre o mapa ────────────────────────────── -->
  <div class="map-modal-overlay">
    <div class="modal">

      <div class="modalHeader">
        <div class="modalHeaderStart">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
            <i data-lucide="chevron-left" width="20" height="20"></i>
          </button>
        </div>
        <div class="modalHeaderCenter">
          <h2 class="modalTitle">Recarga em andamento</h2>
        </div>
        <div class="modalHeaderEnd">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
            <i data-lucide="x" width="18" height="18"></i>
          </button>
        </div>
      </div>

      <div class="modalBody">

        <!-- Carregador ativo -->
        <div class="card recarga-charger-card">
          <div class="recarga-charger-body">
            <span class="recarga-charger-name">Auto Shopping Eixo</span>
            <span class="recarga-charger-meta">Ponto #3 · CCS2 · 50 kW</span>
          </div>
          <span class="reserva-badge reserva-badge--recarga">Em recarga</span>
        </div>

        <!-- Hero: kWh carregados -->
        <div class="card">
          <div class="charging-time-hero">
            <span class="charging-time-value charging-time-value--brand" id="detail-kwh">7,2 kWh</span>
            <span class="charging-time-label">kWh carregados</span>
          </div>
        </div>

        <!-- Stats -->
        <div class="charging-stats charging-stats--stacked">
          <div class="charging-stat-card">
            <span class="charging-stat-label">Tempo decorrido</span>
            <span class="charging-stat-value" id="detail-elapsed">23:00</span>
          </div>
          <div class="charging-stat-card">
            <span class="charging-stat-label">Potência</span>
            <span class="charging-stat-value">50 kW</span>
          </div>
          <div class="charging-stat-card">
            <span class="charging-stat-label">Custo atual</span>
            <span class="charging-stat-value" id="detail-cost">R$ 7,28</span>
          </div>
        </div>

      </div><!-- /modalBody -->

      <div class="botoes-sheet">
        <button class="btn destructive full-width" type="button"
                onclick="router.replace('jornada-1-4-8-recarga-avaliacao')"
                aria-label="Finalizar recarga">
          <i data-lucide="square" width="16" height="16"></i>
          Finalizar recarga
        </button>
      </div>

    </div><!-- /modal -->
  </div><!-- /map-modal-overlay -->

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var TOTAL_SECS = 60 * 60;
    var elapsed    = 23 * 60;

    var KWH_RATE  = 18.9  / TOTAL_SECS;
    var COST_RATE = 19.00 / TOTAL_SECS;

    var kwh  = elapsed * KWH_RATE;
    var cost = elapsed * COST_RATE;

    var kwhEl     = document.getElementById('detail-kwh');
    var elapsedEl = document.getElementById('detail-elapsed');
    var costEl    = document.getElementById('detail-cost');

    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function fmtCost(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

    function tick() {
      kwhEl.textContent     = kwh.toFixed(1) + ' kWh';
      elapsedEl.textContent = pad(Math.floor(elapsed / 60)) + ':' + pad(elapsed % 60);
      costEl.textContent    = fmtCost(cost);
      if (elapsed >= TOTAL_SECS) { clearInterval(iv); return; }
      elapsed++;
      kwh  += KWH_RATE;
      cost += COST_RATE;
    }

    tick();
    var iv = setInterval(tick, 1000);
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
