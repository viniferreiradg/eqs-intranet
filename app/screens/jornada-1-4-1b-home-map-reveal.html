<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/FAB/FAB.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/SearchBar/SearchBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/VehicleChip/VehicleChip.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer — fade in (delay 200ms) ─────────────────── -->
  <div class="map-pins-layer anim-fade-in anim-delay-200">

    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="map-pin-center">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-center map-pin-center-2 pin-brand">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Carregador">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay — entra do topo (delay 0) ────────── -->
  <div class="map-top-overlay anim-enter-top">
    <button class="searchBar" type="button" aria-label="Buscar estação de recarga" tabindex="-1">
      <i data-lucide="search" width="18" height="18" class="icon"></i>
      <span class="placeholder">Buscar estação de recarga</span>
    </button>
    <div class="map-chips-row">
      <button class="vehicleChip" type="button" aria-label="Tesla Model Y" tabindex="-1">
        <span class="iconWrap"><i data-lucide="car" width="16" height="16"></i></span>
        <span class="name">Tesla Model Y</span>
        <i data-lucide="chevron-down" width="14" height="14" class="chevron"></i>
      </button>
      <button class="fab md" type="button" aria-label="Filtros de busca" tabindex="-1">
        <i data-lucide="sliders-horizontal" width="16" height="16"></i>
      </button>
    </div>
  </div>

  <!-- ── FABs direita — sobem de baixo (delay 400ms) ──── -->
  <div class="map-fabs-right anim-enter-bottom anim-delay-400">
    <button class="fab sm" aria-label="Centralizar localização" type="button" tabindex="-1">
      <i data-lucide="locate" width="16" height="16"></i>
    </button>
    <button class="fab lg" aria-label="Escanear QR Code" type="button" tabindex="-1">
      <i data-lucide="qr-code" width="24" height="24"></i>
    </button>
  </div>

  <!-- ── Bottom navigation — sobe de baixo (delay 600ms) ─ -->
  <nav class="screen-nav bottomNav anim-enter-bottom anim-delay-600" aria-label="Navegação principal">
    <button class="navItem navActive" aria-label="Mapa" aria-current="page" tabindex="-1">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" aria-label="Pontos de recarga" tabindex="-1">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" aria-label="Notificações" tabindex="-1">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" aria-label="Carteira" tabindex="-1">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" aria-label="Perfil" tabindex="-1">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    // Após os elementos aparecerem (~1100ms de animações + buffer),
    // substitui silenciosamente pela home interativa — sem animação (goto)
    var isThumbnail = window.frameElement && window.frameElement.classList.contains('thumb-frame');
    if (!isThumbnail) {
      setTimeout(function() {
        router.goto('jornada-1-4-1-home-map');
      }, 1600);
    }
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
