<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code PIX — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Pagar via PIX</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <div class="qr-placeholder">
      <i data-lucide="qr-code" width="72" height="72"></i>
      <span>QR Code PIX</span>
    </div>

    <div class="pix-copy-box">
      <span class="pix-copy-box__key" id="pix-key">
        00020126580014BR.GOV.BCB.PIX0136althus@pix.com.br5204000053039865802BR5925Althus Eletropostos LTDA6009SAO PAULO62070503***6304ABCD
      </span>
      <button class="pix-copy-box__btn" type="button" onclick="copyPix()" aria-label="Copiar chave PIX">
        <i data-lucide="copy" width="14" height="14"></i>
        Copiar
      </button>
    </div>

    <div class="pix-expire-notice">
      <i data-lucide="clock" width="14" height="14"></i>
      QR Code válido por <strong id="pix-timer">09:59</strong>
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary full-width" type="button"
            onclick="router.replace('jornada-1-6-1-carteira')">
      Já realizei o pagamento
    </button>
    <button class="btn ghost full-width" type="button" onclick="router.pop()">
      Alterar valor
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    function copyPix() {
      var key = document.getElementById('pix-key').textContent.trim();
      if (navigator.clipboard) navigator.clipboard.writeText(key);
      var btn = document.querySelector('.pix-copy-box__btn');
      var original = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="check" width="14" height="14"></i> Copiado';
      lucide.createIcons();
      setTimeout(function() { btn.innerHTML = original; lucide.createIcons(); }, 2000);
    }

    var timerInterval = null;
    function startTimer() {
      var seconds = 599;
      clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        if (seconds <= 0) { clearInterval(timerInterval); return; }
        seconds--;
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        document.getElementById('pix-timer').textContent =
          (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    }

    startTimer();
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem navActive" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira" aria-current="page">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
