<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recarga em andamento — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/FAB/FAB.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/SearchBar/SearchBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/VehicleChip/VehicleChip.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer ──────────────────────────────────── -->
  <div class="map-pins-layer" id="map-pins-layer">

    <!-- Marcador do usuário -->
    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <!-- Distributor pins -->
    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Althus pins -->
    <div class="map-pin-center">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo — Em recarga">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-center map-pin-center-2 pin-brand">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Carregador">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay: barra de recarga + busca + chips ─ -->
  <div class="map-top-overlay">

    <!-- Barra de status: recarga em andamento -->
    <button class="charging-bar" type="button"
            onclick="router.push('jornada-1-4-7-recarga-detalhes')"
            aria-label="Recarga em andamento — Auto Shopping Eixo. Ver detalhes.">
      <span class="charging-bar__icon" aria-hidden="true">
        <i data-lucide="zap" width="18" height="18"></i>
      </span>
      <span class="charging-bar__body">
        <span class="charging-bar__title">Carregando · Auto Shopping Eixo</span>
        <span class="charging-bar__meta" id="charging-timer">37:00</span>
      </span>
      <span class="charging-bar__chevron" aria-hidden="true">
        <i data-lucide="chevron-right" width="18" height="18"></i>
      </span>
    </button>

    <!-- SearchBar -->
    <button class="searchBar" type="button" aria-label="Buscar estação de recarga">
      <i data-lucide="search" width="18" height="18" class="icon"></i>
      <span class="placeholder">Buscar estação de recarga</span>
    </button>

    <!-- Chips: veículo + estações + filtros -->
    <div class="map-chips-row">
      <button class="vehicleChip" type="button" aria-label="Veículo selecionado: Tesla Model Y. Toque para trocar."
              onclick="router.push('jornada-1-14-1-veiculos-lista')">
        <span class="iconWrap"><i data-lucide="car" width="16" height="16"></i></span>
        <span class="name">Tesla Model Y</span>
        <i data-lucide="chevron-down" width="14" height="14" class="chevron"></i>
      </button>
      <button class="fab md" type="button" aria-label="Filtros de busca"
              onclick="router.push('jornada-1-4-3-filtros-mapa')">
        <i data-lucide="sliders-horizontal" width="16" height="16"></i>
      </button>
    </div>

  </div>

  <!-- ── FABs direita: localizar ────────────────────── -->
  <div class="map-fabs-right">
    <button class="fab sm" aria-label="Centralizar minha localização" type="button">
      <i data-lucide="locate" width="16" height="16"></i>
    </button>
  </div>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem navActive" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa" aria-current="page">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="notifBadge" aria-hidden="true">2</span>
        <i data-lucide="bell" width="22" height="22"></i>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    // Contador regressivo na barra de recarga
    var totalSeconds = 37 * 60; // 37 minutos em segundos
    var timerEl = document.getElementById('charging-timer');

    function formatTime(secs) {
      var m = Math.floor(secs / 60);
      var s = secs % 60;
      return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    timerEl.textContent = formatTime(totalSeconds);

    var countdown = setInterval(function() {
      if (totalSeconds <= 0) {
        clearInterval(countdown);
        timerEl.textContent = '00:00';
        return;
      }
      totalSeconds--;
      timerEl.textContent = formatTime(totalSeconds);
    }, 1000);

    // Pressed state nos pins clicáveis
    document.querySelectorAll('.map-pin-btn').forEach(function(btn) {
      var svg = btn.querySelector('.mapPin');
      btn.addEventListener('touchstart', function() { svg.classList.add('pressed'); }, { passive: true });
      btn.addEventListener('touchend',   function() { svg.classList.remove('pressed'); });
      btn.addEventListener('touchcancel',function() { svg.classList.remove('pressed'); });
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
