<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Logo/Logo.module.css" />
</head>
<body class="layout-screen splash-screen">

  <div class="splashBlob1"></div>
  <div class="splashBlob2"></div>

  <span class="logoDefault logoLg splashLogo" aria-label="Althus" role="img"></span>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    // Não disparar o redirect se estiver rodando como thumbnail na sidebar
    var isThumbnail = window.frameElement && window.frameElement.classList.contains('thumb-frame');
    if (!isThumbnail) {
      setTimeout(function() { router.replace('jornada-1-2-1-login'); }, 2500);
    }
  </script>

</body>
</html>
