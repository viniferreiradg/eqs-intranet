<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inserir código — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed">

  <!-- ── Câmera simulada (mesmo vídeo do QR) ───────────── -->
  <video
    class="qr-video"
    src="../../src/WhatsApp Video 2026-06-01 at 11.43.09.mp4"
    autoplay
    loop
    muted
    playsinline
  ></video>

  <!-- ── AppBar flutuante ──────────────────────────────── -->
  <header class="qr-appbar">
    <button class="qr-back-btn" onclick="router.pop()" aria-label="Voltar">
      <i data-lucide="chevron-left" width="22" height="22"></i>
    </button>
    <span class="qr-appbar-title">Iniciar recarga</span>
  </header>

  <!-- ── Modal com input na base ───────────────────────── -->
  <div class="map-modal-overlay">
    <div class="modal">

      <div class="modalHeader">
        <div class="modalHeaderStart"></div>
        <div class="modalHeaderCenter">
          <h2 class="modalTitle">Inserir código</h2>
        </div>
        <div class="modalHeaderEnd">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
            <i data-lucide="x" width="18" height="18"></i>
          </button>
        </div>
      </div>

      <div class="modalBody">
        <div class="wrapper">
          <label class="label" for="codigo-carregador">Código do carregador</label>
          <div class="inputWrap">
            <input
              class="input"
              id="codigo-carregador"
              type="text"
              placeholder="Ex: ALT-0042"
              autocomplete="off"
              autocapitalize="characters"
            />
          </div>
        </div>
        <button class="btn primary full-width" type="button" onclick="router.replace('jornada-1-4-6-recarga-pagamento')">
          Usar código
        </button>
      </div>

    </div>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
