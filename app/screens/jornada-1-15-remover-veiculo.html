<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remover veículo — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Dialog/Dialog.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Meus Veículos</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="screen-content" style="padding-top: var(--spacing-md); overflow-y: auto; scrollbar-width: none; align-items: stretch;">

    <div class="settings-group">

      <!-- Veículo ativo -->
      <div class="settings-item" onclick="router.push('jornada-1-7-9-1-veiculo-detalhe')">
        <span class="settings-item-icon" style="background: var(--color-bg-brand); color: var(--color-action-primary);">
          <i data-lucide="car" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">
          Tesla Model Y
          <span class="vehicle-badge">Ativo</span>
        </span>
        <button class="appBarIconBtn" aria-label="Editar Tesla Model Y" type="button"
                onclick="event.stopPropagation(); router.push('jornada-1-7-9-2-veiculo-editar')">
          <i data-lucide="pencil" width="16" height="16"></i>
        </button>
        <button class="appBarIconBtn" aria-label="Remover Tesla Model Y" type="button"
                onclick="event.stopPropagation()">
          <i data-lucide="trash-2" width="16" height="16" style="color: var(--color-action-error);"></i>
        </button>
      </div>

      <!-- Veículo secundário — sendo removido -->
      <div class="settings-item" onclick="router.push('jornada-1-7-9-1-veiculo-detalhe')">
        <span class="settings-item-icon">
          <i data-lucide="car" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">BYD Atto 3</span>
        <button class="appBarIconBtn" aria-label="Editar BYD Atto 3" type="button"
                onclick="event.stopPropagation(); router.push('jornada-1-7-9-2-veiculo-editar')">
          <i data-lucide="pencil" width="16" height="16"></i>
        </button>
        <button class="appBarIconBtn" aria-label="Remover BYD Atto 3" type="button"
                onclick="event.stopPropagation(); openRemoveDialog()">
          <i data-lucide="trash-2" width="16" height="16" style="color: var(--color-action-error);"></i>
        </button>
      </div>

    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary full-width" type="button"
            aria-label="Adicionar veículo"
            onclick="router.push('jornada-1-7-9-2-veiculo-criar')">
      <i data-lucide="plus" width="16" height="16"></i>
      Adicionar veículo
    </button>
  </div>

  <!-- ── Dialog de confirmação de remoção (aberto por padrão) ── -->
  <div class="dialogOverlay" id="remove-dialog" onclick="closeRemoveDialog()">
    <div class="dialog sm" onclick="event.stopPropagation()" role="dialog" aria-modal="true"
         aria-labelledby="remove-dialog-title">
      <div class="dialogHeader">
        <span class="dialogTitle" id="remove-dialog-title">Remover veículo</span>
        <button class="dialogCloseBtn" onclick="closeRemoveDialog()" aria-label="Fechar" type="button">
          <i data-lucide="x" width="16" height="16"></i>
        </button>
      </div>
      <div class="dialogBody">
        <p>Tem certeza que deseja remover o <strong>BYD Atto 3</strong> da sua conta?</p>
      </div>
      <div class="dialogFooter">
        <button class="btn ghost" type="button" onclick="closeRemoveDialog()">Cancelar</button>
        <button class="btn destructive" type="button" onclick="confirmRemove()">Sim, remover</button>
      </div>
    </div>
  </div>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="notifBadge">3</span>
        <i data-lucide="bell" width="22" height="22"></i>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    function openRemoveDialog()  { document.getElementById('remove-dialog').style.display = 'flex'; }
    function closeRemoveDialog() { document.getElementById('remove-dialog').style.display = 'none'; }

    function confirmRemove() {
      closeRemoveDialog();
      router.replace('jornada-1-15-veiculo-removido');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeRemoveDialog();
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
