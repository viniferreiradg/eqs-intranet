<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação em duas etapas — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/OTPInput/OTPInput.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Verificação em duas etapas</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <!-- Subtítulo -->
    <p class="screen-description">
      Insira seu número de celular para receber um código de confirmação e ativar a verificação em duas etapas.
    </p>

    <!-- Telefone -->
    <div class="wrapper hasLeft">
      <label class="label" for="telefone-2fa">Número de celular</label>
      <div class="inputWrap">
        <span class="iconLeft"><i data-lucide="smartphone" width="16" height="16"></i></span>
        <input class="input" id="telefone-2fa" type="tel" inputmode="tel"
               placeholder="(00) 00000-0000" autocomplete="tel" />
      </div>
    </div>

    <!-- Enviar código -->
    <button class="btn secondary full-width" id="btn-enviar-codigo" type="button">
      Enviar código
    </button>

    <!-- Instrução OTP (aparece após envio) -->
    <p class="screen-description" id="otp-hint" aria-live="polite"></p>

    <!-- OTP (desabilitado até o envio) -->
    <div class="otpRoot" id="otp-root" role="group" aria-label="Código de verificação">
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 1 de 6" />
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 2 de 6" />
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 3 de 6" />
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 4 de 6" />
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 5 de 6" />
      <input class="otpCell" type="text" inputmode="numeric" maxlength="1"
             placeholder="·" disabled aria-label="Dígito 6 de 6" />
    </div>

  </div>

  <!-- Rodapé fixo -->
  <div class="cadastro-footer">
    <button class="btn primary full-width" id="btn-confirmar" disabled>
      Confirmar
    </button>
  </div>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var codeSent = false;

    /* ── Enviar código ── */
    document.getElementById('btn-enviar-codigo').addEventListener('click', function () {
      var tel = document.getElementById('telefone-2fa').value.trim();
      if (!tel) return;

      codeSent = true;
      document.getElementById('telefone-2fa').disabled = true;
      document.getElementById('btn-enviar-codigo').disabled = true;
      document.getElementById('otp-hint').textContent =
        'Insira o código de 6 dígitos enviado por SMS para o seu celular.';

      var cells = document.querySelectorAll('#otp-root .otpCell');
      cells.forEach(function (c) { c.disabled = false; });
      cells[0].focus();
    });

    /* ── OTP navigation + checar preenchimento ── */
    (function () {
      var cells    = Array.from(document.querySelectorAll('#otp-root .otpCell'));
      var btnConf  = document.getElementById('btn-confirmar');

      function focusCell(i) { if (cells[i]) cells[i].focus(); }
      function markFilled(cell) { cell.classList.toggle('filled', cell.value.length > 0); }
      function checkComplete() {
        btnConf.disabled = !cells.every(function (c) { return c.value.length === 1; });
      }

      cells.forEach(function (cell, i) {
        cell.addEventListener('input', function () {
          if (!codeSent) return;
          var digit = cell.value.replace(/\D/g, '').slice(-1);
          cell.value = digit;
          markFilled(cell);
          if (digit && i < cells.length - 1) focusCell(i + 1);
          checkComplete();
        });
        cell.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace') {
            if (cell.value) { cell.value = ''; markFilled(cell); }
            else if (i > 0) { focusCell(i - 1); cells[i - 1].value = ''; markFilled(cells[i - 1]); }
            e.preventDefault();
            checkComplete();
          } else if (e.key === 'ArrowLeft'  && i > 0)              focusCell(i - 1);
            else if (e.key === 'ArrowRight' && i < cells.length - 1) focusCell(i + 1);
        });
        cell.addEventListener('paste', function (e) {
          e.preventDefault();
          if (!codeSent) return;
          var pasted = (e.clipboardData || window.clipboardData)
            .getData('text').replace(/\D/g, '').slice(0, cells.length - i);
          for (var j = 0; j < pasted.length; j++) {
            cells[i + j].value = pasted[j];
            markFilled(cells[i + j]);
          }
          focusCell(Math.min(i + pasted.length, cells.length - 1));
          checkComplete();
        });
        cell.addEventListener('focus', function () { cell.select(); });
      });

      btnConf.addEventListener('click', function () {
        if (!btnConf.disabled) router.pop();
      });
    }());
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
