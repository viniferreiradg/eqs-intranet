<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carteira — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/WalletCard/WalletCard.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/DropdownMenu/DropdownMenu.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft"></div>
    <span class="appBarTitle">Carteira</span>
    <div class="appBarSide appBarSideRight">
      <div class="dropdownMenu">
        <button class="appBarIconBtn" aria-label="Mais opções" aria-expanded="false"
                id="wallet-menu-trigger"
                onclick="toggleWalletMenu()">
          <i data-lucide="ellipsis" width="20" height="20"></i>
        </button>
        <div class="dropdownMenu__panel end" id="wallet-menu-panel">
          <button class="dropdownMenu__item" onclick="closeWalletMenu(); router.push('jornada-1-6-4-extrato')">
            <span class="dropdownMenu__item__icon"><i data-lucide="receipt-text" width="16" height="16"></i></span>
            Ver extrato
          </button>
          <button class="dropdownMenu__item" onclick="closeWalletMenu(); router.push('jornada-1-6-5-cupons')">
            <span class="dropdownMenu__item__icon"><i data-lucide="ticket-percent" width="16" height="16"></i></span>
            Meus cupons
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="wallet-screen">

    <!-- WalletCard: saldo + CTA -->
    <div class="walletCard">
      <div class="walletCard__header">
        <span class="walletCard__label">Saldo disponível</span>
      </div>
      <div class="walletCard__balance">
        <span class="walletCard__currency">R$</span>
        <span class="walletCard__amount">247<span class="walletCard__cents">,50</span></span>
      </div>
      <button class="walletCard__cta" type="button"
              onclick="router.push('jornada-1-6-2-carteira-pix')">
        <i data-lucide="plus" width="16" height="16"></i>
        Adicionar saldo
      </button>
    </div>

    <!-- Últimas transações -->
    <div class="wallet-section">
      <div class="wallet-section__header">
        <span class="wallet-section__title">Últimas transações</span>
        <button class="wallet-section__link" type="button"
                onclick="router.push('jornada-1-6-4-extrato')">
          Ver extrato
        </button>
      </div>
      <div class="transaction-list">

        <div class="transaction-item">
          <span class="transaction-item__icon transaction-item__icon--in">
            <i data-lucide="arrow-down-left" width="16" height="16"></i>
          </span>
          <div class="transaction-item__body">
            <span class="transaction-item__desc">Depósito via Pix</span>
            <span class="transaction-item__date">28 mai 2026</span>
          </div>
          <span class="transaction-item__amount transaction-item__amount--in">+R$ 100,00</span>
        </div>

        <div class="transaction-item">
          <span class="transaction-item__icon transaction-item__icon--out">
            <i data-lucide="zap" width="16" height="16"></i>
          </span>
          <div class="transaction-item__body">
            <span class="transaction-item__desc">Recarga — Posto Althus Centro</span>
            <span class="transaction-item__date">25 mai 2026</span>
          </div>
          <span class="transaction-item__amount transaction-item__amount--out">−R$ 38,40</span>
        </div>

        <div class="transaction-item">
          <span class="transaction-item__icon transaction-item__icon--out">
            <i data-lucide="zap" width="16" height="16"></i>
          </span>
          <div class="transaction-item__body">
            <span class="transaction-item__desc">Recarga — Shopping Iguatemi</span>
            <span class="transaction-item__date">20 mai 2026</span>
          </div>
          <span class="transaction-item__amount transaction-item__amount--out">−R$ 52,10</span>
        </div>

      </div>
    </div>

    <!-- Meus cartões -->
    <div class="wallet-section">
      <div class="wallet-section__header">
        <span class="wallet-section__title">Meus cartões</span>
        <button class="wallet-section__link" type="button"
                onclick="router.push('jornada-1-6-6-cartoes')">
          Gerenciar
        </button>
      </div>
      <div class="transaction-list">

        <div class="payment-card-item">
          <span class="payment-card-item__logo">VISA</span>
          <div class="payment-card-item__info">
            <span class="payment-card-item__name">Nubank</span>
            <span class="payment-card-item__number">•••• •••• •••• 4242</span>
          </div>
          <i data-lucide="chevron-right" width="16" height="16"
             style="color: var(--color-text-disabled);"></i>
        </div>

        <div class="payment-card-item" onclick="router.push('jornada-1-6-6-cartoes')">
          <span class="payment-card-item__logo">
            <i data-lucide="plus" width="14" height="14"></i>
          </span>
          <div class="payment-card-item__info">
            <span class="payment-card-item__name">Adicionar cartão</span>
          </div>
          <i data-lucide="chevron-right" width="16" height="16"
             style="color: var(--color-text-disabled);"></i>
        </div>

      </div>
    </div>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem navActive" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira" aria-current="page">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    function toggleWalletMenu() {
      var panel = document.getElementById('wallet-menu-panel');
      var trigger = document.getElementById('wallet-menu-trigger');
      var isOpen = panel.classList.toggle('open');
      trigger.setAttribute('aria-expanded', isOpen);
    }
    function closeWalletMenu() {
      document.getElementById('wallet-menu-panel').classList.remove('open');
      document.getElementById('wallet-menu-trigger').setAttribute('aria-expanded', 'false');
    }
    document.addEventListener('click', function(e) {
      var trigger = document.getElementById('wallet-menu-trigger');
      var panel = document.getElementById('wallet-menu-panel');
      if (trigger && panel && !trigger.contains(e.target) && !panel.contains(e.target)) {
        closeWalletMenu();
      }
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
