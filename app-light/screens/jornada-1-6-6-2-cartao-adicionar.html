<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicionar Cartão — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Adicionar Cartão</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- Preview visual do cartão sendo digitado -->
  <div class="card-visual" id="card-preview">
    <div class="card-visual__chip"></div>
    <span class="card-visual__number" id="preview-number">•••• •••• •••• ••••</span>
    <div class="card-visual__footer">
      <div class="card-visual__holder">
        <span class="card-visual__holder-label">Titular</span>
        <span class="card-visual__holder-name" id="preview-name">NOME DO TITULAR</span>
      </div>
      <div class="card-visual__expiry">
        <span class="card-visual__expiry-label">Validade</span>
        <span class="card-visual__expiry-value" id="preview-expiry">MM/AA</span>
      </div>
      <span class="card-visual__brand" id="preview-brand"></span>
    </div>
  </div>

  <div class="cadastro-body">

    <!-- Número do cartão -->
    <div class="wrapper">
      <label class="label" for="card-number">Número do cartão</label>
      <input
        id="card-number"
        class="input card-number-preview"
        type="tel"
        inputmode="numeric"
        placeholder="0000 0000 0000 0000"
        maxlength="19"
        autocomplete="cc-number"
        oninput="formatCardNumber(this)"
      />
    </div>

    <!-- Nome do titular -->
    <div class="wrapper">
      <label class="label" for="card-name">Nome do titular</label>
      <input
        id="card-name"
        class="input"
        type="text"
        placeholder="Como está no cartão"
        autocomplete="cc-name"
        autocapitalize="characters"
        oninput="document.getElementById('preview-name').textContent = this.value.toUpperCase() || 'NOME DO TITULAR'"
      />
    </div>

    <!-- Validade + CVV lado a lado -->
    <div class="form-row">
      <div class="wrapper">
        <label class="label" for="card-expiry">Validade</label>
        <input
          id="card-expiry"
          class="input"
          type="tel"
          inputmode="numeric"
          placeholder="MM/AA"
          maxlength="5"
          autocomplete="cc-exp"
          oninput="formatExpiry(this)"
        />
      </div>
      <div class="wrapper">
        <label class="label" for="card-cvv">CVV</label>
        <input
          id="card-cvv"
          class="input"
          type="tel"
          inputmode="numeric"
          placeholder="•••"
          maxlength="4"
          autocomplete="cc-csc"
        />
      </div>
    </div>

    <!-- Nota de segurança -->
    <div class="card-security-note">
      <i data-lucide="lock" width="14" height="14"></i>
      Seus dados são criptografados e protegidos. Nunca armazenamos o número completo do cartão.
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary" onclick="saveCard()" type="button" style="width: 100%; justify-content: center;">
      Salvar cartão
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    function formatCardNumber(input) {
      var raw = input.value.replace(/\D/g, '').slice(0, 16);
      var formatted = raw.replace(/(.{4})/g, '$1 ').trim();
      input.value = formatted;

      var display = raw.length
        ? (raw + '________________').slice(0, 16).replace(/(.{4})/g, '$1 ').trim()
        : '•••• •••• •••• ••••';

      /* Mascarar dígitos já digitados exceto os últimos 4 */
      var masked = '';
      for (var i = 0; i < 16; i++) {
        if (i > 0 && i % 4 === 0) masked += ' ';
        masked += (raw[i] && i < raw.length - 4) ? '•' : (raw[i] || '•');
      }

      document.getElementById('preview-number').textContent = raw.length ? masked : '•••• •••• •••• ••••';

      /* Detectar bandeira */
      var brand = '';
      if (/^4/.test(raw))      brand = 'VISA';
      else if (/^5[1-5]/.test(raw) || /^2[2-7]/.test(raw)) brand = 'MC';
      else if (/^3[47]/.test(raw)) brand = 'AMEX';
      else if (/^6/.test(raw)) brand = 'ELO';
      document.getElementById('preview-brand').textContent = brand;
    }

    function formatExpiry(input) {
      var raw = input.value.replace(/\D/g, '').slice(0, 4);
      if (raw.length >= 3) raw = raw.slice(0,2) + '/' + raw.slice(2);
      input.value = raw;
      document.getElementById('preview-expiry').textContent = raw || 'MM/AA';
    }

    function saveCard() {
      router.pop();
    }
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem navActive" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira" aria-current="page">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
