<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excluir Conta — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Excluir Conta</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <!-- Ícone de aviso -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md) 0;">
      <div style="width: 56px; height: 56px; border-radius: var(--radius-full); background: var(--color-status-error-bg); display: flex; align-items: center; justify-content: center;">
        <i data-lucide="triangle-alert" width="24" height="24" style="color: var(--color-action-error);"></i>
      </div>
      <span style="font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">Tem certeza?</span>
    </div>

    <!-- Aviso -->
    <div class="sheet-guest-notice-text" style="text-align: left;">
      A exclusão da conta é <strong>permanente e irreversível</strong>. Todos os seus dados serão removidos, incluindo:
    </div>

    <div class="settings-group">
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="clock" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Histórico de recargas</span>
      </div>
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="wallet" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Saldo na carteira</span>
      </div>
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="car" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Veículos cadastrados</span>
      </div>
    </div>

    <!-- Confirmação por senha -->
    <div class="wrapper">
      <label class="label" for="confirm-senha">Confirme sua senha para continuar</label>
      <div class="inputWrapper">
        <input class="input" id="confirm-senha" type="password" placeholder="••••••••" />
      </div>
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn ghost full-width" type="button" onclick="router.pop()">
      Cancelar
    </button>
    <button class="btn destructive full-width" type="button"
            onclick="router.replace('jornada-1-2-1-login')">
      <i data-lucide="trash-2" width="16" height="16"></i>
      Excluir minha conta
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
