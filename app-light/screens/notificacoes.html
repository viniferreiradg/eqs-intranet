<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft"></div>
    <span class="appBarTitle">Notificações</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- "Marcar todas como lidas" -->
  <div class="notif-topbar">
    <span></span>
    <button class="notif-topbar__link" onclick="markAllRead()" type="button" id="mark-all-btn">
      Marcar todas como lidas
    </button>
  </div>

  <div class="wallet-screen">

    <!-- Hoje -->
    <div>
      <div class="transaction-group-label">Hoje</div>
      <div class="notif-list">

        <button class="notif-item notif-item--unread" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--success">
            <i data-lucide="battery-charging" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Recarga concluída</span>
            <span class="notif-item__desc">Sua recarga no Posto Althus Centro foi concluída. 38,4 kWh adicionados.</span>
            <span class="notif-item__time">Há 2 horas</span>
          </div>
          <span class="notif-unread-dot"></span>
        </button>

        <button class="notif-item notif-item--unread" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--brand">
            <i data-lucide="ticket" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Novo cupom disponível</span>
            <span class="notif-item__desc">Você ganhou um cupom de R$20 de desconto na próxima recarga. Válido até 30/jun.</span>
            <span class="notif-item__time">Há 5 horas</span>
          </div>
          <span class="notif-unread-dot"></span>
        </button>

        <button class="notif-item notif-item--unread" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--success">
            <i data-lucide="wallet" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Depósito confirmado</span>
            <span class="notif-item__desc">R$100,00 foram adicionados à sua carteira via PIX.</span>
            <span class="notif-item__time">Há 6 horas</span>
          </div>
          <span class="notif-unread-dot"></span>
        </button>

      </div>
    </div>

    <!-- Esta semana -->
    <div>
      <div class="transaction-group-label">Esta semana</div>
      <div class="notif-list">

        <button class="notif-item" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--warning">
            <i data-lucide="timer" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Reserva expirando em breve</span>
            <span class="notif-item__desc">Sua reserva no Shopping Iguatemi expira em 15 minutos.</span>
            <span class="notif-item__time">25 mai · 18:30</span>
          </div>
        </button>

        <button class="notif-item" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--success">
            <i data-lucide="battery-charging" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Recarga concluída</span>
            <span class="notif-item__desc">Sua recarga no Shopping Iguatemi foi concluída. 52,1 kWh adicionados.</span>
            <span class="notif-item__time">25 mai · 18:47</span>
          </div>
        </button>

        <button class="notif-item" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--error">
            <i data-lucide="alert-circle" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Carregador indisponível</span>
            <span class="notif-item__desc">O carregador #03 do Posto BR Paulista ficou indisponível durante a sua reserva.</span>
            <span class="notif-item__time">20 mai · 08:10</span>
          </div>
        </button>

      </div>
    </div>

    <!-- Mais antigas -->
    <div>
      <div class="transaction-group-label">Mais antigas</div>
      <div class="notif-list">

        <button class="notif-item" type="button" onclick="readItem(this)">
          <span class="notif-item__icon">
            <i data-lucide="sparkles" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Novidade no app</span>
            <span class="notif-item__desc">Agora você pode reservar carregadores com antecedência. Experimente!</span>
            <span class="notif-item__time">12 mai · 10:00</span>
          </div>
        </button>

        <button class="notif-item" type="button" onclick="readItem(this)">
          <span class="notif-item__icon notif-item__icon--success">
            <i data-lucide="wallet" width="16" height="16"></i>
          </span>
          <div class="notif-item__body">
            <span class="notif-item__title">Depósito confirmado</span>
            <span class="notif-item__desc">R$100,00 foram adicionados à sua carteira via PIX.</span>
            <span class="notif-item__time">12 mai · 10:03</span>
          </div>
        </button>

      </div>
    </div>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    function readItem(btn) {
      btn.classList.remove('notif-item--unread');
      var dot = btn.querySelector('.notif-unread-dot');
      if (dot) dot.remove();
      updateMarkAllBtn();
    }

    function markAllRead() {
      document.querySelectorAll('.notif-item--unread').forEach(function(item) {
        item.classList.remove('notif-item--unread');
        var dot = item.querySelector('.notif-unread-dot');
        if (dot) dot.remove();
      });
      updateMarkAllBtn();
    }

    function updateMarkAllBtn() {
      var unread = document.querySelectorAll('.notif-item--unread').length;
      var btn = document.getElementById('mark-all-btn');
      btn.style.visibility = unread > 0 ? 'visible' : 'hidden';
    }
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações" aria-current="page">
      <span class="navIcon"><i data-lucide="bell" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
