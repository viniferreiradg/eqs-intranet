<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicionar Cupom — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Adicionar cupom</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">
    <p style="font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: var(--line-height-normal); margin: 0;">
      Digite o código do cupom recebido por e-mail ou compartilhado com você.
    </p>

    <!-- Input de código -->
    <div class="wrapper" id="code-field-wrapper">
      <label class="label" for="coupon-code">Código do cupom</label>
      <input
        id="coupon-code"
        class="input"
        type="text"
        placeholder="Ex: ALT-XXXXXX"
        autocomplete="off"
        autocapitalize="characters"
        oninput="resetState()"
      />
      <span class="helper" id="code-helper" hidden></span>
      <span class="helperError" id="code-error" hidden></span>
    </div>

    <!-- Feedback de sucesso -->
    <div id="code-success" hidden
      style="display: flex; align-items: center; gap: var(--spacing-xs); font-size: var(--font-size-sm); padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-sm); background: var(--color-status-success-bg); color: var(--color-status-success-fg);">
      <i data-lucide="circle-check" width="16" height="16"></i>
      Cupom adicionado com sucesso!
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary" onclick="validateCode()" type="button" style="width: 100%; justify-content: center;">
      Validar cupom
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var VALID_CODES = ['ALT-TESTE', 'ALT-ESPECIAL'];
    var USED_CODES  = ['ALT-PROMO10'];

    function resetState() {
      var wrapper = document.getElementById('code-field-wrapper');
      var error   = document.getElementById('code-error');
      var success = document.getElementById('code-success');
      wrapper.classList.remove('error', 'success');
      error.hidden = true;
      success.hidden = true;
      success.style.display = 'none';
    }

    function validateCode() {
      var input   = document.getElementById('coupon-code');
      var code    = input.value.trim().toUpperCase();
      var wrapper = document.getElementById('code-field-wrapper');
      var error   = document.getElementById('code-error');
      var success = document.getElementById('code-success');

      resetState();

      if (!code) {
        wrapper.classList.add('error');
        error.hidden = false;
        error.textContent = 'Digite um código para continuar.';
        return;
      }

      if (USED_CODES.indexOf(code) !== -1) {
        wrapper.classList.add('error');
        error.hidden = false;
        error.textContent = 'Este cupom já foi utilizado.';
        return;
      }

      if (VALID_CODES.indexOf(code) === -1) {
        wrapper.classList.add('error');
        error.hidden = false;
        error.textContent = 'Código inválido ou expirado. Verifique e tente novamente.';
        return;
      }

      /* Sucesso */
      wrapper.classList.add('success');
      success.hidden = false;
      success.style.display = 'flex';
      lucide.createIcons();

      setTimeout(function() { router.pop(); }, 1800);
    }
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem navActive" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira" aria-current="page">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
