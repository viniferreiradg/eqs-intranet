<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe do Veículo — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Tesla Model Y</span>
    <div class="appBarSide appBarSideRight">
      <button class="appBarIconBtn" aria-label="Editar veículo" type="button"
              onclick="router.push('jornada-1-7-9-2-veiculo-editar')">
        <i data-lucide="pencil" width="20" height="20"></i>
      </button>
    </div>
  </header>

  <div class="screen-content screen-content--flush">

    <!-- Foto do veículo -->
    <div class="vehicle-hero">
      <img class="vehicle-hero-img" alt="Tesla Model Y" />
    </div>

    <!-- Nome e badge -->
    <div class="detail-section-header">
      <span class="detail-section-title">Tesla Model Y</span>
      <span class="vehicle-badge">Ativo</span>
    </div>

    <!-- Dados do veículo -->
    <div class="info-cards">

      <div class="info-card">
        <span class="info-card__label">Marca</span>
        <span class="info-card__icon"><i data-lucide="building-2" width="16" height="16"></i></span>
        <span class="info-card__value">Tesla</span>
      </div>

      <div class="info-card">
        <span class="info-card__label">Modelo</span>
        <span class="info-card__icon"><i data-lucide="car" width="16" height="16"></i></span>
        <span class="info-card__value">Model Y</span>
      </div>

      <div class="info-card">
        <span class="info-card__label">Ano</span>
        <span class="info-card__icon"><i data-lucide="calendar" width="16" height="16"></i></span>
        <span class="info-card__value">2023</span>
      </div>

      <div class="info-card">
        <span class="info-card__label">Conector</span>
        <span class="info-card__icon"><i data-lucide="zap" width="16" height="16"></i></span>
        <span class="info-card__value info-card__value--brand">CCS2</span>
      </div>

      <div class="info-card info-card--full">
        <span class="info-card__label">Placa</span>
        <span class="info-card__icon"><i data-lucide="credit-card" width="16" height="16"></i></span>
        <span class="info-card__value">ABC-1D23</span>
      </div>

    </div>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
