<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Veículo — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Editar Veículo</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <div class="wrapper">
      <label class="label" for="edit-marca">Marca</label>
      <div class="inputWrap">
        <select class="input" id="edit-marca" onchange="atualizarModelos(this.value, 'edit-modelo', null)">
          <option value="" disabled>Selecionar marca</option>
          <option selected>Tesla</option>
          <option>BYD</option>
          <option>Volkswagen</option>
          <option>BMW</option>
          <option>Mercedes</option>
          <option>Audi</option>
          <option>Hyundai</option>
          <option>Kia</option>
          <option>Porsche</option>
          <option>Volvo</option>
          <option>Peugeot</option>
          <option>Renault</option>
          <option>Nissan</option>
          <option>Chevrolet</option>
          <option>Fiat</option>
          <option>Jeep</option>
          <option>Mini</option>
        </select>
      </div>
    </div>

    <div class="wrapper">
      <label class="label" for="edit-modelo">Modelo</label>
      <div class="inputWrap">
        <select class="input" id="edit-modelo">
          <option value="" disabled>Selecionar modelo</option>
          <option>Model 3</option>
          <option selected>Model Y</option>
          <option>Model S</option>
          <option>Model X</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="wrapper">
        <label class="label" for="edit-ano">Ano</label>
        <div class="inputWrap">
          <input class="input" id="edit-ano" type="number" value="2023" min="2000" max="2099" />
        </div>
      </div>
      <div class="wrapper">
        <label class="label" for="edit-placa">Placa</label>
        <div class="inputWrap">
          <input class="input" id="edit-placa" type="text" value="ABC-1D23" />
        </div>
      </div>
    </div>

    <div class="wrapper">
      <label class="label" for="edit-conector">Tipo de conector</label>
      <div class="inputWrap">
        <select class="input" id="edit-conector">
          <option value="ccs2" selected>CCS2</option>
          <option value="chademo">CHAdeMO</option>
          <option value="type2">Type 2 (AC)</option>
          <option value="tesla">Tesla / NACS</option>
          <option value="j1772">J1772 (Type 1)</option>
          <option value="gbdc">GB/DC</option>
        </select>
      </div>
    </div>

  </div>

  <div class="cadastro-footer">
    <p class="screen-description">Não achou o seu veículo?</p>
    <button class="btn secondary full-width" type="button"
            onclick="router.push('jornada-1-7-veiculo-manual')">
      Cadastrar veículo
    </button>
    <button class="btn primary full-width" type="button" onclick="router.pop()">
      Salvar alterações
    </button>
    <button class="btn ghost full-width" type="button" onclick="router.pop()">
      Cancelar
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var MODELOS = {
      'Tesla':      ['Model 3', 'Model Y', 'Model S', 'Model X'],
      'BYD':        ['Atto 3', 'Dolphin', 'Han', 'Seal', 'Tang'],
      'Volkswagen': ['ID.3', 'ID.4', 'ID.6'],
      'BMW':        ['i3', 'i4', 'i7', 'iX', 'iX1', 'iX3'],
      'Mercedes':   ['EQA', 'EQB', 'EQC', 'EQE', 'EQS'],
      'Audi':       ['e-tron 55', 'Q4 e-tron', 'Q8 e-tron'],
      'Hyundai':    ['Ioniq 5', 'Ioniq 6', 'Kona Electric'],
      'Kia':        ['EV6', 'EV9', 'Niro EV'],
      'Porsche':    ['Taycan', 'Macan Electric'],
      'Volvo':      ['C40 Recharge', 'XC40 Recharge'],
      'Peugeot':    ['e-208', 'e-2008'],
      'Renault':    ['Zoe', 'Megane E-Tech'],
      'Nissan':     ['Leaf', 'Ariya'],
      'Chevrolet':  ['Bolt EV', 'Bolt EUV'],
      'Fiat':       ['500e'],
      'Jeep':       ['Avenger Electric'],
      'Mini':       ['Cooper SE', 'Countryman SE'],
    };

    function atualizarModelos(marca, selectId, valorAtual) {
      var sel = document.getElementById(selectId);
      sel.innerHTML = '';
      var modelos = MODELOS[marca] || [];
      if (!modelos.length) {
        sel.disabled = true;
        sel.innerHTML = '<option value="" disabled selected>Selecione a marca primeiro</option>';
        return;
      }
      sel.disabled = false;
      if (!valorAtual) {
        var placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.selected = true;
        placeholder.textContent = 'Selecionar modelo';
        sel.appendChild(placeholder);
      }
      modelos.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === valorAtual) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  </script>

  <!-- ── Bottom navigation ─────────────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil" aria-current="page">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>lucide.createIcons();</script>

</body>
</html>
