<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postos — Althus</title>
  <link rel="stylesheet" href="../../storybook/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/Avatar/Avatar.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft"></div>
    <span class="appBarTitle">Postos</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Toolbar: busca + filtro ────────────────────── -->
  <div class="postos-toolbar">
    <div class="wrapper hasLeft">
      <div class="inputWrap">
        <span class="iconLeft"><i data-lucide="search" width="16" height="16"></i></span>
        <input class="input" type="search" placeholder="Buscar localidade..." />
      </div>
    </div>
    <button class="postos-filter-btn" aria-label="Filtros" type="button">
      <i data-lucide="sliders-horizontal" width="18" height="18"></i>
    </button>
  </div>

  <!-- ── Lista de localidades ───────────────────────── -->
  <div class="postos-list">

    <button class="posto-item" type="button">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_03.jpg" alt="Rede Flex" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Auto Shopping Eixo</span>
        <div class="posto-item-meta">
          <span>0,8 km</span><span>·</span><span>6 carregadores</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_05.jpg" alt="AutoCharge" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Iguatemi São Paulo</span>
        <div class="posto-item-meta">
          <span>1,2 km</span><span>·</span><span>4 carregadores</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_07.jpg" alt="Voltamax" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Shopping Morumbi</span>
        <div class="posto-item-meta">
          <span>2,5 km</span><span>·</span><span>8 carregadores</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="avatar md"><span class="avatarInitials">PI</span></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Parque do Ibirapuera</span>
        <div class="posto-item-meta">
          <span>3,1 km</span><span>·</span><span>2 carregadores</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_09.jpg" alt="EcoCharge" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">WTorre Nações Unidas</span>
        <div class="posto-item-meta">
          <span>4,7 km</span><span>·</span><span>3 carregadores</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <!-- Desativados — todos os carregadores ocupados -->
    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_16.jpg" alt="GreenPower" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Shopping Eldorado</span>
        <div class="posto-item-meta">
          <span>1,8 km</span><span>·</span><span>4 carregadores</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="clock" width="12" height="12"></i>
          <span>Todos os carregadores ocupados</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="avatar md"><span class="avatarInitials">CS</span></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Continental Shopping</span>
        <div class="posto-item-meta">
          <span>5,2 km</span><span>·</span><span>2 carregadores</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="clock" width="12" height="12"></i>
          <span>Todos os carregadores ocupados</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <!-- Desativado — conector incompatível -->
    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="avatar md"><img class="avatarImg" src="../../links/credenciados/logo-credenciados_15.jpg" alt="Turbo Eletro" /></div>
      <div class="posto-item-info">
        <span class="posto-item-name">Posto Ipiranga Bandeirantes</span>
        <div class="posto-item-meta">
          <span>6,0 km</span><span>·</span><span>3 carregadores</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="plug" width="12" height="12"></i>
          <span>Conector incompatível</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

  </div>

  <!-- ── Bottom nav (standalone) ───────────────────── -->
  <nav id="screen-bottom-nav" class="screen-nav bottomNav" aria-label="Navegação principal">
    <button class="navItem" data-tab="mapa" onclick="router.tab('jornada-1-4-1-home-map')" aria-label="Mapa">
      <span class="navIcon"><i data-lucide="map" width="22" height="22"></i></span>
    </button>
    <button class="navItem navActive" data-tab="pontos" onclick="router.tab('jornada-1-4-lista-postos')" aria-label="Pontos de recarga" aria-current="page">
      <span class="navIcon"><i data-lucide="fuel" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="notificacoes" onclick="router.tab('notificacoes')" aria-label="Notificações">
      <span class="navIcon">
        <span class="wrap">
          <i data-lucide="bell" width="22" height="22"></i>
          <span class="badge">3</span>
        </span>
      </span>
    </button>
    <button class="navItem" data-tab="carteira" onclick="router.tab('jornada-1-6-1-carteira')" aria-label="Carteira">
      <span class="navIcon"><i data-lucide="wallet" width="22" height="22"></i></span>
    </button>
    <button class="navItem" data-tab="perfil" onclick="router.tab('jornada-1-7-1-perfil')" aria-label="Perfil">
      <span class="navIcon"><i data-lucide="user" width="22" height="22"></i></span>
    </button>
  </nav>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
