<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EQS Intranet</title>

  <link rel="stylesheet" href="../componentes/tokens/tokens.css" />
  <link rel="stylesheet" href="../shared/page.css" />
  <link rel="stylesheet" href="../componentes/AuthCard/AuthCard.module.css" />
  <link rel="stylesheet" href="../componentes/Background/Background.module.css" />
  <link rel="stylesheet" href="../componentes/Logo/Logo.module.css" />
  <link rel="stylesheet" href="../componentes/Input/Input.module.css" />
  <link rel="stylesheet" href="../componentes/Button/Button.module.css" />
  <link rel="stylesheet" href="../componentes/Feedback/Feedback.module.css" />
</head>
<body class="layout-auth">

  <main class="page bgWrapper">
    <div class="blob1"></div>
    <div class="blob2"></div>

    <section class="card" aria-labelledby="login-title">
      <div class="logoWrap">
        <span class="logoDefault logoMd" role="img" aria-label="Logo"></span>
      </div>

      <header class="header">
        <h1 class="title" id="login-title">Entrar</h1>
        <p class="description">Acesse o painel administrativo da intranet.</p>
      </header>

      <form class="body" id="login-form" novalidate>
        <div class="alert error" id="login-feedback" role="alert" hidden>
          <span class="fbIcon"><i data-lucide="circle-x" width="18" height="18"></i></span>
          <div class="fbBody">
            <div class="fbTitle">Erro de autenticação</div>
            <div class="fbMessage" id="login-feedback-msg">E-mail ou senha inválidos.</div>
          </div>
        </div>

        <div class="wrapper">
          <label class="label" for="email">E-mail</label>
          <div class="inputWrap hasLeft">
            <span class="iconLeft"><i data-lucide="mail" width="16" height="16"></i></span>
            <input class="input" id="email" name="email" type="email"
                   placeholder="nome@empresa.com" autocomplete="username" />
          </div>
        </div>

        <div class="wrapper">
          <label class="label" for="senha">Senha</label>
          <div class="inputWrap hasLeft hasRight">
            <span class="iconLeft"><i data-lucide="lock" width="16" height="16"></i></span>
            <input class="input" id="senha" name="senha" type="password"
                   placeholder="••••••••" autocomplete="current-password" />
            <button class="iconRightBtn" id="senha-toggle" type="button" aria-label="Mostrar senha">
              <i data-lucide="eye" width="16" height="16"></i>
            </button>
          </div>
        </div>

        <div class="authRow">
          <label class="ckWrapper" for="lembrar">
            <input class="ckInput" type="checkbox" id="lembrar" name="lembrar" />
            <span class="ckBox"><i data-lucide="check" width="12" height="12"></i></span>
            <span class="ckLabel">Lembrar de mim</span>
          </label>
          <a class="authLink" href="redefinir-senha.html">Esqueci minha senha</a>
        </div>

        <button class="btn primary btnFullWidth" type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();

    /* Toggle mostrar/ocultar senha */
    const senha = document.getElementById('senha');
    const toggle = document.getElementById('senha-toggle');
    toggle.addEventListener('click', () => {
      const show = senha.type === 'password';
      senha.type = show ? 'text' : 'password';
      toggle.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
      toggle.innerHTML = `<i data-lucide="${show ? 'eye-off' : 'eye'}" width="16" height="16"></i>`;
      lucide.createIcons();
    });

    /* Submit (protótipo): campos vazios → erro; preenchidos → segue para o dashboard */
    const form = document.getElementById('login-form');
    const feedback = document.getElementById('login-feedback');
    const feedbackMsg = document.getElementById('login-feedback-msg');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email || !senha.value) {
        feedbackMsg.textContent = 'Preencha e-mail e senha para continuar.';
        feedback.hidden = false;
        return;
      }
      feedback.hidden = true;
      /* Dashboard ainda não existe no protótipo — próximo destino será plugado aqui */
      alertProtoDestino();
    });
    function alertProtoDestino() {
      feedback.classList.remove('error');
      feedback.classList.add('success');
      feedback.querySelector('.fbIcon').innerHTML = '<i data-lucide="circle-check" width="18" height="18"></i>';
      feedback.querySelector('.fbTitle').textContent = 'Login validado';
      feedbackMsg.textContent = 'Dashboard em construção — em breve este fluxo continua.';
      feedback.hidden = false;
      lucide.createIcons();
    }
  </script>
</body>
</html>
